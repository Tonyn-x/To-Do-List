<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista To Do</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <main class="container"> 
        <section class="todoapp"> 
            <header> 
                <h2>Lista To Do <img src="imagens/icon.png" alt="Ícone"></h2>
            </header>
            
            <div class="row-pesquisa">
                <input type="text" id="input-pesquisa" placeholder="Pesquisar por título..." oninput="renderizarTarefas()">
            </div>
            
            <div class="area-cadastro">
            <input type="text" id="input-box" placeholder="Título da tarefa...">
            <input type="text" id="input-desc" placeholder="Descrição da tarefa...">
            
            <div class="grupo-prioridade">
                <label for="select-prioridade">Prioridade:</label>
                <select id="select-prioridade">
                    <option value="Baixa">Baixa</option>
                    <option value="Média" selected>Média</option>
                    <option value="Alta">Alta</option>
                </select>
            </div>

            <button id="btn-adicionar">Adicionar</button>
        </div>
            
            <p id="mensagem-vazia" style="display: none; text-align: center; color: #555;">Nenhuma tarefa cadastrada.</p>
            
            <ul id="container-lista"></ul>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
